<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto y Ubicación</title>
    <link rel="stylesheet" href="contacto.css">
</head>
<body>
    <header>
        <h1>Bruma & Esencia</h1>

        <nav class="header__nav">
            <ul class="header__nav-list">
                <li class="header__nav-item">
                    <a href="inicio.html">Inicio</a>
                </li>

                <li class="header__nav-item">
                    <a href="cuenta.html">Mi cuenta</a>
                </li>

                <li class="header__nav-item">
                    <a href="contacto.html">Contacto y Ubicación</a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="contenedor-contacto">
            <section class="contacto">
                <h2>Contactanos</h2>
                <form class="formulario">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" required>

                    <label for="correo">Correo electrónico</label>
                    <input type="email" id="correo" required>

                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" rows="5" required></textarea>

                    <button type="submit">Enviar</button>
                </form>
            </section>

            <section class="ubicacion">
                <h2>Nuestra ubicación</h2>
                <p>📍 Neuquén Capital, Argentina</p>
                <p>📞 +54 299 123-4567</p>
                <p>✉ contacto@brumayesencia.com</p>

                <iframe
                    src="https://maps.google.com/maps?q=Neuquen&t=&z=13&ie=UTF8&iwloc=&output=embed"
                    loading="lazy">
                </iframe>
            </section>
        </div>
    </main>
    <footer>
        <p>© 2026 Bruma & Esencia - Todos los derechos reservados.</p>
    </footer>
</body>
</html>
